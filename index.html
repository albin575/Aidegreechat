<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qwen Chat - AI Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out',
                        'slide-up': 'slideUp 0.4s ease-out',
                        'pulse-slow': 'pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'bounce-slight': 'bounceSlight 0.3s ease-in-out',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        bounceSlight: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-4px)' } }
                    }
                }
            }
        }
    </script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; }
        .message-bubble { max-width: 85%; word-wrap: break-word; }
        @media (max-width: 640px) { .message-bubble { max-width: 92%; } }
        .typing-dot { animation: typingBounce 1.4s infinite ease-in-out both; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typingBounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        .code-block { position: relative; }
        .code-block:hover .copy-btn { opacity: 1; }
        .copy-btn { opacity: 0; transition: opacity 0.2s; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .dark .glass-panel {
            background: rgba(17, 24, 39, 0.7);
        }
        .gradient-text {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .input-glow:focus-within {
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }
        .sidebar-transition { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .message-enter { animation: slideUp 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-300 h-screen overflow-hidden font-sans">

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed left-0 top-0 h-full w-72 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 transform -translate-x-full md:translate-x-0 sidebar-transition z-40 flex flex-col">
        <div class="p-4 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white font-bold text-sm">Q</div>
                <span class="font-semibold text-lg">Qwen Chat</span>
            </div>
            <button onclick="toggleSidebar()" class="md:hidden p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-colors">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <button onclick="newChat()" class="mx-4 mt-4 mb-2 p-3 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white font-medium flex items-center justify-center gap-2 transition-all hover:shadow-lg hover:shadow-indigo-500/30 active:scale-95">
            <i class="fas fa-plus"></i> New Chat
        </button>

        <div class="flex-1 overflow-y-auto custom-scrollbar p-4 space-y-2" id="chatHistory">
            <!-- Chat history items will be inserted here -->
        </div>

        <div class="p-4 border-t border-gray-200 dark:border-gray-700 space-y-2">
            <button onclick="openSettings()" class="w-full p-3 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center gap-3 transition-colors text-left">
                <i class="fas fa-cog text-gray-500"></i> Settings
            </button>
            <button onclick="toggleDarkMode()" class="w-full p-3 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center gap-3 transition-colors text-left">
                <i class="fas fa-moon text-gray-500" id="darkModeIcon"></i> <span id="darkModeText">Dark Mode</span>
            </button>
        </div>
    </aside>

    <!-- Overlay for mobile sidebar -->
    <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 z-30 hidden md:hidden backdrop-blur-sm transition-opacity"></div>

    <!-- Main Content -->
    <main class="md:ml-72 h-full flex flex-col relative">
        <!-- Header -->
        <header class="h-16 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between px-4 glass-panel sticky top-0 z-20">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="md:hidden p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-colors">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="flex items-center gap-2">
                    <span class="text-sm font-medium text-gray-600 dark:text-gray-400">Model:</span>
                    <select id="modelSelect" class="bg-transparent text-sm font-semibold outline-none cursor-pointer text-gray-900 dark:text-gray-100">
                        <option value="qwen/qwen-2.5-72b-instruct">Qwen 2.5 72B</option>
                        <option value="qwen/qwen-2.5-7b-instruct">Qwen 2.5 7B</option>
                        <option value="qwen/qwen-2.5-32b-instruct">Qwen 2.5 32B</option>
                        <option value="qwen/qwen-2.5-coder-32b-instruct">Qwen 2.5 Coder 32B</option>
                    </select>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="exportChat()" class="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-colors text-gray-600 dark:text-gray-400" title="Export Chat">
                    <i class="fas fa-download"></i>
                </button>
                <button onclick="clearCurrentChat()" class="p-2 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg transition-colors text-red-500" title="Clear Chat">
                    <i class="fas fa-trash-alt"></i>
                </button>
            </div>
        </header>

        <!-- Chat Area -->
        <div id="chatContainer" class="flex-1 overflow-y-auto custom-scrollbar p-4 space-y-6 scroll-smooth">
            <!-- Welcome Screen -->
            <div id="welcomeScreen" class="flex flex-col items-center justify-center h-full text-center px-4 animate-fade-in">
                <div class="w-20 h-20 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white text-3xl font-bold mb-6 shadow-xl shadow-indigo-500/30">
                    <i class="fas fa-robot"></i>
                </div>
                <h1 class="text-4xl font-bold mb-3 gradient-text">Qwen Chat</h1>
                <p class="text-gray-500 dark:text-gray-400 max-w-md mb-8 text-lg">Powered by Qwen 2.5 via OpenRouter. Ask anything, get intelligent responses.</p>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 max-w-lg w-full">
                    <button onclick="setPrompt('Explain quantum computing in simple terms')" class="p-4 rounded-xl border border-gray-200 dark:border-gray-700 hover:border-indigo-500 dark:hover:border-indigo-500 hover:bg-indigo-50 dark:hover:bg-indigo-900/20 transition-all text-left group">
                        <i class="fas fa-atom text-indigo-500 mb-2 group-hover:scale-110 transition-transform"></i>
                        <p class="text-sm font-medium">Explain quantum computing</p>
                    </button>
                    <button onclick="setPrompt('Write a Python script to automate file organization')" class="p-4 rounded-xl border border-gray-200 dark:border-gray-700 hover:border-indigo-500 dark:hover:border-indigo-500 hover:bg-indigo-50 dark:hover:bg-indigo-900/20 transition-all text-left group">
                        <i class="fas fa-code text-indigo-500 mb-2 group-hover:scale-110 transition-transform"></i>
                        <p class="text-sm font-medium">Python automation script</p>
                    </button>
                    <button onclick="setPrompt('Help me write a professional email to request a meeting')" class="p-4 rounded-xl border border-gray-200 dark:border-gray-700 hover:border-indigo-500 dark:hover:border-indigo-500 hover:bg-indigo-50 dark:hover:bg-indigo-900/20 transition-all text-left group">
                        <i class="fas fa-envelope text-indigo-500 mb-2 group-hover:scale-110 transition-transform"></i>
                        <p class="text-sm font-medium">Draft a professional email</p>
                    </button>
                    <button onclick="setPrompt('What are the latest trends in AI for 2026?')" class="p-4 rounded-xl border border-gray-200 dark:border-gray-700 hover:border-indigo-500 dark:hover:border-indigo-500 hover:bg-indigo-50 dark:hover:bg-indigo-900/20 transition-all text-left group">
                        <i class="fas fa-brain text-indigo-500 mb-2 group-hover:scale-110 transition-transform"></i>
                        <p class="text-sm font-medium">Latest AI trends</p>
                    </button>
                </div>
            </div>

            <!-- Messages will appear here -->
            <div id="messagesArea" class="hidden space-y-6 max-w-4xl mx-auto w-full pb-4"></div>

            <!-- Typing Indicator -->
            <div id="typingIndicator" class="hidden max-w-4xl mx-auto w-full">
                <div class="flex items-start gap-3">
                    <div class="w-8 h-8 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white text-xs flex-shrink-0">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl rounded-tl-sm px-4 py-3 shadow-sm">
                        <div class="flex gap-1">
                            <div class="w-2 h-2 bg-gray-400 rounded-full typing-dot"></div>
                            <div class="w-2 h-2 bg-gray-400 rounded-full typing-dot"></div>
                            <div class="w-2 h-2 bg-gray-400 rounded-full typing-dot"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="border-t border-gray-200 dark:border-gray-700 p-4 glass-panel">
            <div class="max-w-4xl mx-auto relative">
                <div class="input-glow flex items-end gap-2 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-2xl p-2 transition-all">
                    <textarea 
                        id="messageInput" 
                        rows="1" 
                        placeholder="Message Qwen..." 
                        class="flex-1 bg-transparent border-0 outline-none resize-none max-h-32 py-3 px-3 text-gray-900 dark:text-gray-100 placeholder-gray-400"
                        onkeydown="handleKeyDown(event)"
                        oninput="autoResize(this)"
                    ></textarea>
                    <button 
                        id="sendBtn" 
                        onclick="sendMessage()" 
                        class="p-3 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white transition-all hover:shadow-lg hover:shadow-indigo-500/30 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:shadow-none mb-1"
                    >
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
                <p class="text-xs text-center mt-2 text-gray-400">Qwen can make mistakes. Consider checking important information.</p>
            </div>
        </div>
    </main>

    <!-- Settings Modal -->
    <div id="settingsModal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeSettings()"></div>
        <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-white dark:bg-gray-800 rounded-2xl shadow-2xl w-full max-w-md p-6 border border-gray-200 dark:border-gray-700 animate-slide-up">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-xl font-bold">Settings</h2>
                <button onclick="closeSettings()" class="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-colors">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-medium mb-2">OpenRouter API Key</label>
                    <div class="relative">
                        <input 
                            type="password" 
                            id="apiKeyInput" 
                            placeholder="sk-or-v1-..." 
                            class="w-full p-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-900 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition-all"
                        >
                        <button onclick="toggleApiKeyVisibility()" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                            <i class="fas fa-eye" id="apiKeyEye"></i>
                        </button>
                    </div>
                    <p class="text-xs text-gray-500 mt-1">Your key is stored locally in your browser.</p>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">System Prompt</label>
                    <textarea 
                        id="systemPromptInput" 
                        rows="3" 
                        placeholder="You are a helpful assistant..." 
                        class="w-full p-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-900 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition-all resize-none"
                    >You are a helpful, harmless, and honest assistant. You provide accurate, well-reasoned responses.</textarea>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">Temperature: <span id="tempValue">0.7</span></label>
                    <input type="range" id="temperatureInput" min="0" max="2" step="0.1" value="0.7" class="w-full accent-indigo-600" oninput="document.getElementById('tempValue').textContent = this.value">
                </div>
            </div>

            <button onclick="saveSettings()" class="w-full mt-6 p-3 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white font-medium transition-all hover:shadow-lg active:scale-95">
                Save Settings
            </button>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-20 left-1/2 transform -translate-x-1/2 bg-gray-900 dark:bg-white text-white dark:text-gray-900 px-6 py-3 rounded-full shadow-lg opacity-0 pointer-events-none transition-all duration-300 z-50 flex items-center gap-2">
        <i class="fas fa-check-circle text-green-400 dark:text-green-600"></i>
        <span id="toastMessage">Copied!</span>
    </div>

    <script>
        // State
        let currentChatId = null;
        let chats = {};
        let isGenerating = false;
        let abortController = null;
        let settings = {
            apiKey: localStorage.getItem('openrouter_api_key') || '',
            systemPrompt: localStorage.getItem('system_prompt') || 'You are a helpful, harmless, and honest assistant. You provide accurate, well-reasoned responses.',
            temperature: parseFloat(localStorage.getItem('temperature')) || 0.7
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadChats();
            renderChatHistory();

            // Check dark mode preference
            if (localStorage.getItem('darkMode') === 'true' || (!localStorage.getItem('darkMode') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                updateDarkModeUI(true);
            }

            // Load settings into inputs
            document.getElementById('apiKeyInput').value = settings.apiKey;
            document.getElementById('systemPromptInput').value = settings.systemPrompt;
            document.getElementById('temperatureInput').value = settings.temperature;
            document.getElementById('tempValue').textContent = settings.temperature;

            // Focus input
            document.getElementById('messageInput').focus();
        });

        // Dark Mode
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('darkMode', isDark);
            updateDarkModeUI(isDark);
        }

        function updateDarkModeUI(isDark) {
            const icon = document.getElementById('darkModeIcon');
            const text = document.getElementById('darkModeText');
            if (isDark) {
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
                text.textContent = 'Light Mode';
            } else {
                icon.classList.remove('fa-sun');
                icon.classList.add('fa-moon');
                text.textContent = 'Dark Mode';
            }
        }

        // Sidebar
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            const isOpen = !sidebar.classList.contains('-translate-x-full');

            if (isOpen) {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            } else {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            }
        }

        // Chat Management
        function loadChats() {
            const stored = localStorage.getItem('chats');
            if (stored) {
                chats = JSON.parse(stored);
            }
        }

        function saveChats() {
            localStorage.setItem('chats', JSON.stringify(chats));
        }

        function newChat() {
            if (isGenerating) return;
            currentChatId = Date.now().toString();
            chats[currentChatId] = {
                id: currentChatId,
                title: 'New Chat',
                messages: [],
                createdAt: new Date().toISOString()
            };
            saveChats();
            renderChatHistory();
            showWelcomeScreen();
            if (window.innerWidth < 768) toggleSidebar();
        }

        function loadChat(chatId) {
            if (isGenerating) return;
            currentChatId = chatId;
            const chat = chats[chatId];
            if (!chat) return;

            document.getElementById('welcomeScreen').classList.add('hidden');
            const messagesArea = document.getElementById('messagesArea');
            messagesArea.classList.remove('hidden');
            messagesArea.innerHTML = '';

            chat.messages.forEach(msg => {
                appendMessage(msg.role, msg.content, false);
            });

            renderChatHistory();
            scrollToBottom();
            if (window.innerWidth < 768) toggleSidebar();
        }

        function deleteChat(chatId, event) {
            event.stopPropagation();
            if (confirm('Delete this chat?')) {
                delete chats[chatId];
                if (currentChatId === chatId) {
                    currentChatId = null;
                    showWelcomeScreen();
                }
                saveChats();
                renderChatHistory();
            }
        }

        function renderChatHistory() {
            const container = document.getElementById('chatHistory');
            container.innerHTML = '';

            const sortedChats = Object.values(chats).sort((a, b) => b.id - a.id);

            sortedChats.forEach(chat => {
                const isActive = chat.id === currentChatId;
                const div = document.createElement('div');
                div.className = `group flex items-center justify-between p-3 rounded-xl cursor-pointer transition-all ${isActive ? 'bg-indigo-50 dark:bg-indigo-900/30 border border-indigo-200 dark:border-indigo-800' : 'hover:bg-gray-100 dark:hover:bg-gray-700 border border-transparent'}`;
                div.onclick = () => loadChat(chat.id);
                div.innerHTML = `
                    <div class="flex items-center gap-3 overflow-hidden">
                        <i class="fas fa-comment-alt text-gray-400 flex-shrink-0"></i>
                        <span class="text-sm font-medium truncate">${escapeHtml(chat.title)}</span>
                    </div>
                    <button onclick="deleteChat('${chat.id}', event)" class="opacity-0 group-hover:opacity-100 p-1 hover:bg-red-100 dark:hover:bg-red-900/30 rounded-lg text-red-500 transition-all">
                        <i class="fas fa-trash-alt text-xs"></i>
                    </button>
                `;
                container.appendChild(div);
            });

            if (sortedChats.length === 0) {
                container.innerHTML = '<p class="text-sm text-gray-400 text-center py-4">No chats yet</p>';
            }
        }

        function showWelcomeScreen() {
            document.getElementById('welcomeScreen').classList.remove('hidden');
            document.getElementById('messagesArea').classList.add('hidden');
            document.getElementById('messagesArea').innerHTML = '';
        }

        function clearCurrentChat() {
            if (!currentChatId || isGenerating) return;
            if (confirm('Clear all messages in this chat?')) {
                chats[currentChatId].messages = [];
                saveChats();
                showWelcomeScreen();
            }
        }

        function exportChat() {
            if (!currentChatId || !chats[currentChatId] || chats[currentChatId].messages.length === 0) {
                showToast('No chat to export');
                return;
            }
            const chat = chats[currentChatId];
            let content = `# ${chat.title}\n\n`;
            chat.messages.forEach(msg => {
                content += `**${msg.role === 'user' ? 'You' : 'Assistant'}:**\n${msg.content}\n\n---\n\n`;
            });

            const blob = new Blob([content], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `chat-${chat.id}.md`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('Chat exported!');
        }

        // Messaging
        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 128) + 'px';
        }

        function setPrompt(text) {
            document.getElementById('messageInput').value = text;
            autoResize(document.getElementById('messageInput'));
            document.getElementById('messageInput').focus();
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message || isGenerating) return;

            if (!settings.apiKey) {
                showToast('Please set your API key in Settings');
                openSettings();
                return;
            }

            // Create new chat if needed
            if (!currentChatId) {
                currentChatId = Date.now().toString();
                chats[currentChatId] = {
                    id: currentChatId,
                    title: message.slice(0, 30) + (message.length > 30 ? '...' : ''),
                    messages: [],
                    createdAt: new Date().toISOString()
                };
            }

            // Add user message
            chats[currentChatId].messages.push({ role: 'user', content: message });
            saveChats();
            renderChatHistory();

            // UI updates
            input.value = '';
            input.style.height = 'auto';
            document.getElementById('welcomeScreen').classList.add('hidden');
            document.getElementById('messagesArea').classList.remove('hidden');

            appendMessage('user', message, true);
            showTypingIndicator();

            isGenerating = true;
            updateSendButton();

            try {
                await streamResponse(message);
            } catch (error) {
                console.error('Error:', error);
                hideTypingIndicator();
                appendErrorMessage(error.message);
            } finally {
                isGenerating = false;
                updateSendButton();
                saveChats();
            }
        }

        async function streamResponse(userMessage) {
            const messages = [
                { role: 'system', content: settings.systemPrompt },
                ...chats[currentChatId].messages.slice(-10) // Keep last 10 messages for context
            ];

            abortController = new AbortController();

            const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${settings.apiKey}`,
                    'Content-Type': 'application/json',
                    'HTTP-Referer': window.location.href,
                    'X-Title': 'Qwen Chat App'
                },
                body: JSON.stringify({
                    model: document.getElementById('modelSelect').value,
                    messages: messages,
                    temperature: settings.temperature,
                    stream: true
                }),
                signal: abortController.signal
            });

            if (!response.ok) {
                const error = await response.json().catch(() => ({}));
                throw new Error(error.error?.message || `HTTP error! status: ${response.status}`);
            }

            hideTypingIndicator();

            const assistantMessageId = 'msg-' + Date.now();
            const messageDiv = createAssistantMessageElement(assistantMessageId);
            document.getElementById('messagesArea').appendChild(messageDiv);
            scrollToBottom();

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let fullContent = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                const chunk = decoder.decode(value, { stream: true });
                const lines = chunk.split('\n');

                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        const data = line.slice(6);
                        if (data === '[DONE]') continue;

                        try {
                            const parsed = JSON.parse(data);
                            const content = parsed.choices?.[0]?.delta?.content;
                            if (content) {
                                fullContent += content;
                                updateAssistantMessage(assistantMessageId, fullContent);
                            }
                        } catch (e) {
                            // Ignore parse errors for incomplete chunks
                        }
                    }
                }
            }

            chats[currentChatId].messages.push({ role: 'assistant', content: fullContent });
            finalizeAssistantMessage(assistantMessageId, fullContent);
        }

        function createAssistantMessageElement(id) {
            const div = document.createElement('div');
            div.id = id;
            div.className = 'message-enter flex items-start gap-3';
            div.innerHTML = `
                <div class="w-8 h-8 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white text-xs flex-shrink-0 mt-1">
                    <i class="fas fa-robot"></i>
                </div>
                <div class="message-bubble bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl rounded-tl-sm px-4 py-3 shadow-sm">
                    <div class="prose dark:prose-invert prose-sm max-w-none overflow-x-auto">
                        <div class="assistant-content text-gray-800 dark:text-gray-200"></div>
                    </div>
                </div>
            `;
            return div;
        }

        function updateAssistantMessage(id, content) {
            const div = document.getElementById(id);
            if (!div) return;
            const contentDiv = div.querySelector('.assistant-content');
            // Render markdown incrementally (simplified for streaming)
            contentDiv.innerHTML = marked.parse(content);
            scrollToBottom();
        }

        function finalizeAssistantMessage(id, content) {
            const div = document.getElementById(id);
            if (!div) return;
            const contentDiv = div.querySelector('.assistant-content');
            contentDiv.innerHTML = marked.parse(content);

            // Add copy button to code blocks
            div.querySelectorAll('pre code').forEach((block) => {
                hljs.highlightElement(block);
                const pre = block.parentElement;
                pre.classList.add('code-block', 'relative', 'rounded-lg', 'p-4', 'mt-2', 'mb-2', 'overflow-x-auto');

                const copyBtn = document.createElement('button');
                copyBtn.className = 'copy-btn absolute top-2 right-2 p-2 rounded-lg bg-gray-700/80 hover:bg-gray-600 text-white text-xs transition-all';
                copyBtn.innerHTML = '<i class="fas fa-copy"></i>';
                copyBtn.onclick = () => {
                    navigator.clipboard.writeText(block.textContent);
                    showToast('Code copied!');
                    copyBtn.innerHTML = '<i class="fas fa-check"></i>';
                    setTimeout(() => copyBtn.innerHTML = '<i class="fas fa-copy"></i>', 2000);
                };
                pre.appendChild(copyBtn);
            });

            // Add copy button for entire message
            const bubble = div.querySelector('.message-bubble');
            const copyMessageBtn = document.createElement('button');
            copyMessageBtn.className = 'absolute top-2 right-2 p-1.5 rounded-lg opacity-0 group-hover:opacity-100 hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-400 transition-all';
            copyMessageBtn.innerHTML = '<i class="fas fa-copy text-xs"></i>';
            copyMessageBtn.onclick = () => {
                navigator.clipboard.writeText(content);
                showToast('Message copied!');
            };
            bubble.classList.add('relative', 'group');
            bubble.appendChild(copyMessageBtn);

            scrollToBottom();
        }

        function appendMessage(role, content, animate = false) {
            const messagesArea = document.getElementById('messagesArea');
            const div = document.createElement('div');
            div.className = `flex items-start gap-3 ${animate ? 'message-enter' : ''}`;

            if (role === 'user') {
                div.className += ' flex-row-reverse';
                div.innerHTML = `
                    <div class="w-8 h-8 rounded-full bg-gradient-to-br from-emerald-500 to-teal-600 flex items-center justify-center text-white text-xs flex-shrink-0 mt-1">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="message-bubble bg-indigo-600 text-white rounded-2xl rounded-tr-sm px-4 py-3 shadow-sm">
                        <p class="text-sm whitespace-pre-wrap">${escapeHtml(content)}</p>
                    </div>
                `;
            } else {
                div.innerHTML = `
                    <div class="w-8 h-8 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white text-xs flex-shrink-0 mt-1">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="message-bubble bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl rounded-tl-sm px-4 py-3 shadow-sm relative group">
                        <div class="prose dark:prose-invert prose-sm max-w-none overflow-x-auto">
                            <div class="text-gray-800 dark:text-gray-200">${marked.parse(content)}</div>
                        </div>
                    </div>
                `;
            }

            messagesArea.appendChild(div);

            if (role === 'assistant') {
                finalizeAssistantMessage(div.id || ('msg-' + Date.now()), content);
            }

            scrollToBottom();
        }

        function appendErrorMessage(error) {
            const messagesArea = document.getElementById('messagesArea');
            const div = document.createElement('div');
            div.className = 'flex items-start gap-3 message-enter';
            div.innerHTML = `
                <div class="w-8 h-8 rounded-full bg-red-500 flex items-center justify-center text-white text-xs flex-shrink-0 mt-1">
                    <i class="fas fa-exclamation"></i>
                </div>
                <div class="message-bubble bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-2xl rounded-tl-sm px-4 py-3 text-red-700 dark:text-red-300 text-sm">
                    <i class="fas fa-circle-exclamation mr-2"></i> ${escapeHtml(error)}
                </div>
            `;
            messagesArea.appendChild(div);
            scrollToBottom();
        }

        function showTypingIndicator() {
            document.getElementById('typingIndicator').classList.remove('hidden');
            scrollToBottom();
        }

        function hideTypingIndicator() {
            document.getElementById('typingIndicator').classList.add('hidden');
        }

        function scrollToBottom() {
            const container = document.getElementById('chatContainer');
            container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
        }

        function updateSendButton() {
            const btn = document.getElementById('sendBtn');
            btn.disabled = isGenerating;
            btn.innerHTML = isGenerating ? '<i class="fas fa-stop"></i>' : '<i class="fas fa-paper-plane"></i>';
            if (isGenerating) {
                btn.onclick = stopGeneration;
                btn.classList.remove('bg-indigo-600', 'hover:bg-indigo-700');
                btn.classList.add('bg-red-600', 'hover:bg-red-700');
            } else {
                btn.onclick = sendMessage;
                btn.classList.remove('bg-red-600', 'hover:bg-red-700');
                btn.classList.add('bg-indigo-600', 'hover:bg-indigo-700');
            }
        }

        function stopGeneration() {
            if (abortController) {
                abortController.abort();
                abortController = null;
            }
            isGenerating = false;
            hideTypingIndicator();
            updateSendButton();
        }

        // Settings
        function openSettings() {
            document.getElementById('settingsModal').classList.remove('hidden');
        }

        function closeSettings() {
            document.getElementById('settingsModal').classList.add('hidden');
        }

        function toggleApiKeyVisibility() {
            const input = document.getElementById('apiKeyInput');
            const icon = document.getElementById('apiKeyEye');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        function saveSettings() {
            settings.apiKey = document.getElementById('apiKeyInput').value.trim();
            settings.systemPrompt = document.getElementById('systemPromptInput').value;
            settings.temperature = parseFloat(document.getElementById('temperatureInput').value);

            localStorage.setItem('openrouter_api_key', settings.apiKey);
            localStorage.setItem('system_prompt', settings.systemPrompt);
            localStorage.setItem('temperature', settings.temperature);

            closeSettings();
            showToast('Settings saved!');
        }

        // Utilities
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = message;
            toast.classList.remove('opacity-0', 'pointer-events-none');
            toast.classList.add('opacity-100');
            setTimeout(() => {
                toast.classList.remove('opacity-100');
                toast.classList.add('opacity-0', 'pointer-events-none');
            }, 3000);
        }

        // Configure marked
        marked.setOptions({
            breaks: true,
            gfm: true,
            headerIds: false
        });
    </script>
</body>
